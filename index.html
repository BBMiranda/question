<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Platform Administrator</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <header class="quiz-header">
      <h1>Quiz - Platform Administrator</h1>
      <div id="progressBar">
        <div class="progress-fill"></div>
      </div>
    </header>

    <aside class="sidebar" id="leftCol">
      <h2>Placar</h2>
      <div id="scoreEntry">
        <input type="text" id="playerName" placeholder="Digite seu nome">
      </div>
      <div id="scoreboard"></div>
      <button id="clearScoreboardBtn">Apagar Placar</button>
    </aside>

    <main id="quiz-area">
      <div id="quizContent">
        <!-- O conteúdo do quiz será inserido aqui -->
      </div>
    </main>

    <aside class="sidebar" id="rightCol">
      <h2>Pontuação</h2>
      <div class="exam-select">
        <label for="examSelect">Prova</label>
        <select id="examSelect">
          <option value="admin" selected>Platform Administrator</option>
          <option value="developer">Platform Developer</option>
          <option value="appbuilder">Platform App Builder</option>
        </select>
      </div>
      <div class="score-stats">
        <p class="stat-item stat-correct">Corretas <span id="correctCount">0</span></p>
        <p class="stat-item stat-wrong">Erradas <span id="wrongCount">0</span></p>
      </div>
      <div id="finalScore"></div>
      <div id="scoreButtons">
        <button id="finishQuizBtn">Finalizar Quiz</button>
        <button id="startEvalBtn">Iniciar Avaliação</button>
      </div>
      <div id="navSection">
        <hr>
        <h2>Navegação</h2>
        <div id="questionNav"></div>
        <div id="navPages"></div>
      </div>
    </aside>
  </div>

  <!-- Modal da Avaliação -->
  <div id="evaluationModal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <div id="evalProgress"></div>
      <div id="evalQuizContent"></div>
      <div id="evalNavButtonsContainer"></div>
      <div class="modal-footer">
        <button id="evalFinishBtn">Finalizar Avaliação</button>
      </div>
      <div id="evalFeedback"></div>
      <div id="timer"></div>
    </div>
  </div>

  <!-- Containers de Notificação -->
  <div id="confirmContainer"></div>
  <div id="toastContainer"></div>

  <script src="assets/js/data/questions-admin.js"></script>
  <script src="assets/js/data/questions-developer.js"></script>
  <script src="assets/js/data/questions-appbuilder.js"></script>
  <script src="assets/js/core.js"></script>
  <script src="assets/js/feedback.js"></script>
  <script src="assets/js/quiz.js"></script>
  <script src="assets/js/evaluation.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
